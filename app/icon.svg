<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbf6e9"/>
      <stop offset="100%" stop-color="#e7d4a4"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a76a32"/>
      <stop offset="100%" stop-color="#5b3210"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Hebrew letter Beit (ב), the first letter of the Torah -->
  <text x="50%" y="58%"
        text-anchor="middle"
        dominant-baseline="middle"
        font-family="Frank Ruhl Libre, Times New Roman, serif"
        font-weight="900"
        font-size="360"
        fill="url(#ink)">ב</text>
  <!-- Decorative line beneath -->
  <rect x="120" y="420" width="272" height="6" rx="3" fill="#8a5a2b" opacity="0.5"/>
</svg>
